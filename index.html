<html lang="ru">
<head>

    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a0a1e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px 0 60px 0;
        }

        /* ===== ЭКРАН 1: ПРИЗНАНИЕ ===== */
        #screen1 {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            transition: opacity 1s ease;
            z-index: 10;
        }
        #screen1.hidden {
            display: none;
        }

        .heart-emoji {
            font-size: 80px;
            animation: pulse 1.5s ease-in-out infinite;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        }
        .heart-emoji:active {
            transform: scale(0.8);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        #clickHint {
            color: #ff99cc;
            font-size: 18px;
            margin-top: 25px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.7;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.2; }
        }

        #burstContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            overflow: hidden;
        }
        .burst-heart {
            position: absolute;
            font-size: 30px;
            animation: flyOut 1.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes flyOut {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(720deg); opacity: 0; }
        }

        #loveMessage {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
        }
        #loveMessage.show {
            display: flex;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        #loveMessage h1 {
            color: #ff4d7a;
            font-size: 42px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 77, 122, 0.5);
            text-align: center;
            letter-spacing: 2px;
        }

        #loveMessage .photo-container {
            width: 100%;
            max-width: 360px;
            margin: 20px auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 77, 122, 0.3);
            border: 3px solid #ff4d7a;
        }
        #loveMessage .photo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        #loveMessage .sub-text {
            color: #ffb3d1;
            font-size: 18px;
            margin-top: 10px;
            font-weight: 300;
            text-align: center;
        }

        .btn-to-reasons {
            margin-top: 25px;
            background: transparent;
            border: 2px solid #ff4d7a;
            color: #ff4d7a;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .btn-to-reasons:hover {
            background: #ff4d7a;
            color: #fff;
        }

               ЭКРАН 2: ГЕНЕРАТОР КОМПЛИМЕНТОВ + 100 ПРИЧИН
               ============================================================== */
        #screen2 {

            max-width: 600px;
            padding: 40px 24px 80px 24px;
            display: none;
            z-index: 5;
            animation: fadeInUp 1s ease;
        }
        #screen2.show {
            display: block;
        }

        /* ---- Блок комплиментов ---- */
        .compliment-block {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 30px 25px 35px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 77, 122, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .compliment-block h2 {
            color: #ffb3d1;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        #complimentDisplay {
            color: #fff;
            font-size: 22px;
            line-height: 1.7;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            font-weight: 300;
            transition: opacity 0.5s ease;
        }
        #complimentDisplay.fade {
            opacity: 0;
        }

        .compliment-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .compliment-actions button {
            background: rgba(255, 77, 122, 0.15);
            border: 1px solid rgba(255, 77, 122, 0.3);
            color: #ffb3d1;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .compliment-actions button:hover {
            background: #ff4d7a;
            color: #fff;
            border-color: #ff4d7a;
            transform: scale(1.02);
        }
        .compliment-actions button:active {
            transform: scale(0.95);
        }

        #emailNotification {
            color: #66bb6a;
            font-size: 14px;
            margin-top: 12px;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #emailNotification.show {
            opacity: 1;
        }

        /* ---- Разделитель ---- */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff4d7a, transparent);
            margin: 10px auto 35px;
        }

        /* ---- 100 причин ---- */
        #screen2 h2 {
            color: #ff4d7a;
            font-size: 32px;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
        }
        #screen2 .subhead {
            text-align: center;
            color: #ffb3d1;
            font-weight: 300;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .reason-item {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            padding: 14px 20px;
            margin-bottom: 10px;
            border-radius: 16px;
            color: #f0d6e8;
            font-size: 16px;
            line-height: 1.5;
            border-left: 4px solid #ff4d7a;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.5s ease forwards;
            transition: background 0.2s;
        }
        .reason-item:hover {
            background: rgba(255, 77, 122, 0.15);
        }

            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .reason-item span {
            color: #ff4d7a;
            font-weight: 700;
            margin-right: 8px;

        #loadMoreBtn {
            display: block;
            margin: 30px auto 0;
            background: #ff4d7a;
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255, 77, 122, 0.3);
        }
        #loadMoreBtn:hover {
            transform: scale(1.03);

        #loadMoreBtn:disabled {

        .floating-heart {
            position: fixed;
            font-size: 14px;
            pointer-events: none;
            opacity: 0.3;
            animation: floatUp 8s linear infinite;
            z-index: 1;

            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }

            .reason-item { font-size: 14px; padding: 12px 16px; }
            #screen2 h2 { font-size: 26px; }
            #complimentDisplay { font-size: 19px; }
            .compliment-actions button { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>

            const emojis = ['❤️', '💖', '💗', '♥️', '❤️‍🔥', '💝', '💘'];

                const heart = document.createElement('div');
                heart.className = 'burst-heart';
                heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                heart.style.left = cx + 'px';
                heart.style.top = cy + 'px';
                const angle = Math.random() * 2 * Math.PI;
                const distance = 80 + Math.random() * 300;
                heart.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                heart.style.setProperty('--ty', Math.sin(angle) * distance - 100 + 'px');
                heart.style.fontSize = (20 + Math.random() * 40) + 'px';
                burstContainer.appendChild(heart);
                setTimeout(() => heart.remove(), 2000);

            bigHeart.style.display = 'none';
            clickHint.style.display = 'none';
            setTimeout(() => {
                loveMessage.classList.add('show');
